id: customer-create-001
name: 创建客户

app:
  start_url: http://localhost:3000/admin/customers

task: |
  创建一个新客户，客户名为“测试客户 A”，手机号为“13800000001”。

success_criteria: |
  客户保存成功，并且客户列表中可以看到“测试客户 A”。

failure_criteria: |
  页面出现保存失败、权限不足、网络错误、表单校验无法通过，
  或超过最大步骤仍无法确认客户已创建。

constraints:
  max_steps: 25
  timeout_ms: 120000
  allow_external_navigation: false
  headless: true

artifacts:
  screenshots: true
  network: true
  console: true
